name: 🖼️ Blog Image Generator v2

on:
  push:
    branches: [main, master]
    paths:
      - "_posts/**.md"       # ONLY triggers on real blog posts
      - "_posts/**.mdx"      # NOT on README, index, or other files

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "all"
        type: choice
        options:
          - all        # retroactively add images to ALL posts missing one
          - new_only   # only the post added in latest push

permissions:
  contents: write

jobs:
  generate-images:
    name: Generate Content-Relevant Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Detect new blog posts
        id: detect
        run: |
          # Only detect actual post files (inside _posts/)
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '_posts/*.md' '_posts/*.mdx' 2>/dev/null | grep -v -i readme | grep -v -i index || echo "")
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ -n "$NEW_POSTS" ]; then
            echo "run_mode=new_only" >> $GITHUB_OUTPUT
          else
            echo "run_mode=all" >> $GITHUB_OUTPUT
          fi

          echo "📋 New posts: $NEW_POSTS"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🎨 Generate blog images
        env:
          RUN_MODE: ${{ steps.detect.outputs.run_mode }}
          NEW_FILE: ${{ steps.detect.outputs.new_posts }}
        run: python generate_blog_images.py

      - name: 💾 Commit images back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/blog/ _posts/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ Nothing new to commit"
          else
            git commit -m "🖼️ Add content-relevant SEO images [skip ci]"
            git push
            echo "✅ Images pushed!"
          fi
