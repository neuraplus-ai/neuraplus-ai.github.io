name: 🖼️ Auto Blog Image Generator

# ─── TRIGGERS ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    paths:
      - "_posts/**"          # triggers when you add/edit any blog post
      - "content/posts/**"   # Hugo support
      - "blog/**"            # plain blog folder support

  workflow_dispatch:         # manual trigger button in GitHub Actions UI
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "all"
        type: choice
        options:
          - all              # retroactively fix ALL posts missing images
          - new_only         # only process newly added posts

# ─── PERMISSIONS ─────────────────────────────────────────────────────────────
permissions:
  contents: write            # needed to commit generated images back to repo

jobs:
  generate-images:
    name: Generate SEO Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2     # need prev commit to detect new files

      # ── 2. Detect which posts are NEW in this push ──────────────────────
      - name: 🔍 Detect new/changed posts
        id: detect
        run: |
          # Get list of added/modified markdown files in this push
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '_posts/*.md' 'content/posts/*.md' 'blog/*.md' 2>/dev/null || echo "")
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT

          # Decide run mode
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ -n "$NEW_POSTS" ]; then
            echo "run_mode=new_only" >> $GITHUB_OUTPUT
          else
            echo "run_mode=all" >> $GITHUB_OUTPUT
          fi

          echo "📋 New posts detected: $NEW_POSTS"
          echo "🎯 Run mode: $(cat $GITHUB_OUTPUT | grep run_mode | cut -d= -f2)"

      # ── 3. Setup Python ─────────────────────────────────────────────────
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Run image generator ──────────────────────────────────────────
      - name: 🎨 Generate blog images
        env:
          RUN_MODE: ${{ steps.detect.outputs.run_mode }}
          NEW_FILE: ${{ steps.detect.outputs.new_posts }}
        run: |
          echo "🚀 Starting image generation..."
          echo "Mode: $RUN_MODE"
          python generate_blog_images.py

      # ── 5. Commit images + updated posts back to repo ───────────────────
      - name: 💾 Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage generated images
          git add assets/images/blog/ 2>/dev/null || true

          # Stage updated posts (frontmatter + hero image injected)
          git add _posts/ content/posts/ blog/ 2>/dev/null || true

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "✅ No changes to commit (all posts already have images)"
          else
            git commit -m "🖼️ Auto-generate SEO blog images [skip ci]

            - Generated featured images for blog posts
            - Added Open Graph / Twitter Card meta images
            - Injected hero images into post content
            - All images optimized for SEO (1200x630px)

            [Generated by Auto Blog Image workflow]"

            git push
            echo "✅ Images committed and pushed!"
          fi

      # ── 6. Summary ──────────────────────────────────────────────────────
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 🖼️ Blog Image Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ steps.detect.outputs.run_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Images API | Pollinations.ai (Free) |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Size | 1200×630px (SEO optimized) |" >> $GITHUB_STEP_SUMMARY
          echo "| Locations | Featured Image + Hero + OG Meta |" >> $GITHUB_STEP_SUMMARY
