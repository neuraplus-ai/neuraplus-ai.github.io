name: Blog Image Generator v5

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "remaining"
        type: choice
        options:
          - remaining
          - all

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Generate images
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'remaining' }}
        run: python generate_blog_images.py
