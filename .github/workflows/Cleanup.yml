name: Cleanup Language Folders and Hreflang

on:
  workflow_dispatch:  # Run manually with one click

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Delete all language folders
        run: |
          for folder in ar de es fr hi id pt ru zh; do
            if [ -d "$folder" ]; then
              rm -rf "$folder"
              echo "Deleted folder: $folder"
            else
              echo "Folder not found (already gone): $folder"
            fi
          done

      - name: Remove hreflang tags from all HTML files
        run: |
          python3 - <<'EOF'
          import os, re

          BLOCK = re.compile(
              r'\s*<!-- AUTO-HREFLANG-START -->.*?<!-- AUTO-HREFLANG-END -->\s*',
              re.DOTALL
          )
          LINE = re.compile(
              r'[ \t]*<link[^>]+hreflang=["\'][^"\']*["\'][^>]*/>\s*\n?',
              re.IGNORECASE
          )

          changed = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if f.endswith('.html'):
                      path = os.path.join(root, f)
                      with open(path, 'r', encoding='utf-8', errors='ignore') as fh:
                          original = fh.read()
                      updated = BLOCK.sub('\n', original)
                      updated = LINE.sub('', updated)
                      if updated != original:
                          with open(path, 'w', encoding='utf-8') as fh:
                              fh.write(updated)
                          changed.append(path)
                          print(f"Cleaned: {path}")

          print(f"\nTotal files cleaned: {len(changed)}")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: remove language folders and hreflang tags [skip ci]"
          git push
