name: NeuraPulse Enterprise SEO

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Enterprise Script
        run: python neurapulse_enterprise.py

      - name: Run Card Injector
        run: |
          if [ -f neurapulse_card_injector.py ]; then
            python neurapulse_card_injector.py
          fi

      - name: Commit and Push
        run: |
          git config user.email "bot@neurapulse.ai"
          git config user.name "NeuraPulse Bot"
          git add -A
          git diff --staged --quiet && echo 'Nothing to commit' || git commit -m "[bot] Enterprise: nav+footer+seo [skip ci]"
          git push origin HEAD
