# ══════════════════════════════════════════════════════
#  NeuraPulse SEO Engine — GitHub Actions Workflow v2.1
#  · Runs on every push to main/master
#  · Runs every Sunday at midnight UTC
#  · Can be triggered manually from GitHub Actions tab
# ══════════════════════════════════════════════════════
name: NeuraPulse SEO Engine

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'seo-run-log.txt'
      - 'seo-audit-report.json'
      - 'sitemap.xml'
      - 'sitemap.html'
      - 'rss.xml'
      - 'robots.txt'
      - 'llms.txt'
      - 'ai.txt'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-engine:
    runs-on: ubuntu-latest
    name: Run SEO Engine — All Phases
    steps:

      # ── 1. Checkout full repo ──
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python ──
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Run SEO Engine ──
      - name: Run NeuraPulse SEO Engine
        run: python seo_engine.py

      # ── 4. Commit and push with rebase to avoid conflicts ──
      - name: Commit & Push Changes
        run: |
          git config user.email "seo-bot@neuraplus.ai"
          git config user.name "NeuraPulse SEO Bot"
          git add -A
          git diff --staged --quiet \
            && echo "✅ Nothing changed — repo already up to date" \
            || git commit -m "🤖 SEO Engine v2: nav + footer + schema + sitemap [skip ci]"
          git pull --rebase origin main
          git push origin HEAD

      # ── 5. Upload run log as downloadable artifact ──
      - name: Upload SEO Run Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-log-${{ github.run_number }}
          path: seo-run-log.txt
          retention-days: 30
