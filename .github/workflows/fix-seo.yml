name: Fix All Blog SEO + Privacy Links

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fix script on all HTML files
        run: python fix_all_blogs.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit — all files already up to date."
          else
            git commit -m "auto: fix SEO meta tags + privacy policy links on all pages"
            git push
          fi
