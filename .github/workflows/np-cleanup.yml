name: NeuraPulse Cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Cleanup
        run: python neurapulse_cleanup.py --auto

      - name: Commit
        run: |
          git config user.email "bot@neurapulse.ai"
          git config user.name "NeuraPulse Bot"
          git add -A
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "cleanup: remove enterprise injection [skip ci]"
          git push
