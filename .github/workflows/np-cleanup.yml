name: NeuraPulse Enterprise Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only? (true = preview only, false = apply changes)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      create_backup:
        description: "Create backup branch before cleaning?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preview changes (dry run)
        run: python neurapulse_cleanup.py --dry-run --verbose

      - name: Create backup branch
        if: ${{ inputs.create_backup == 'true' && inputs.dry_run == 'false' }}
        run: |
          git config user.email "bot@neurapulse.ai"
          git config user.name "NeuraPulse Bot"
          BRANCH="backup/pre-cleanup-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "Backup branch created: $BRANCH"
          git checkout -

      - name: Apply cleanup
        if: ${{ inputs.dry_run == 'false' }}
        run: echo "y" | python neurapulse_cleanup.py --verbose

      - name: Commit changes
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config user.email "bot@neurapulse.ai"
          git config user.name "NeuraPulse Bot"
          git add -A
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "cleanup: remove enterprise injection damage"
          git push origin HEAD

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-log
          path: cleanup-log-*.txt
          if-no-files-found: ignore
