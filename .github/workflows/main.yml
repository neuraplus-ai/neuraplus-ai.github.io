name: Add Popup to All Pages

on:
  workflow_dispatch:

jobs:
  add-popup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add popup to all HTML files
        run: |
          python3 << 'PYEOF'
          import os, glob

          CSS_LINE = '  <link rel="stylesheet" href="/popup.css">'
          JS_LINE  = '  <script src="/popup.js"></script>'
          SKIP = ["contact.html"]

          files = glob.glob("**/*.html", recursive=True)
          print(f"Found {len(files)} HTML files")

          updated = 0
          for path in files:
              fname = os.path.basename(path)
              if fname in SKIP:
                  print(f"SKIP: {path}")
                  continue
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              if "popup.css" in content or "popup.js" in content:
                  print(f"SKIP (done): {path}")
                  continue
              if "</head>" in content:
                  content = content.replace("</head>", f"{CSS_LINE}\n</head>", 1)
              if "</body>" in content:
                  content = content.replace("</body>", f"{JS_LINE}\n</body>", 1)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"✅ Updated: {path}")
              updated += 1

          print(f"\nDone! Updated {updated} files")
          PYEOF

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "Add popup to all HTML pages" || echo "Nothing to commit"
          git push
