# ============================================================
# NeuraPulse — Auto Blog Image Generator Workflow
# Save as: .github/workflows/auto-blog-images.yml
#
# IMPORTANT: Script must be named "generate_images.py"
# and placed in the ROOT of your repository.
# ============================================================

name: Auto Blog Image Generator

on:
  push:
    paths:
      - "blog/**.html"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "missing"
        type: choice
        options:
          - missing
          - replace
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: blog-images
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Blog Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu-core libwebp-dev --no-install-recommends -qq

      - name: Install Python packages
        run: pip install -q --upgrade pip pillow

      - name: Verify script exists
        run: |
          if [ ! -f "generate_images.py" ]; then
            echo "ERROR: generate_images.py not found in repo root!"
            exit 1
          fi
          echo "generate_images.py found OK"

      - name: Run image generator
        run: |
          MODE="${{ github.event.inputs.mode || 'missing' }}"
          echo "Running in mode: $MODE"
          python3 generate_images.py $MODE
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show results
        run: |
          echo "=== Generated WebP images ==="
          ls -lh assets/images/blog/*.webp 2>/dev/null | awk '{print $5, $9}' || echo "None yet"

      - name: Commit and push
        run: |
          git config user.name  "NeuraPulse Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/blog/ blog/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: blog images [skip ci]"
            git push
            echo "Committed and pushed"
          else
            echo "Nothing new to commit"
          fi
