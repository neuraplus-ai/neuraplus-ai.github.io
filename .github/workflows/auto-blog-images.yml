# ============================================================
# NeuraPlusAI — Auto Blog Image Generator Workflow
# Save as: .github/workflows/auto-blog-images.yml
#
# HOW IT WORKS:
#  Push new blog/*.html     → generates image for ONLY that post
#  Post already has image   → SKIPPED completely (not touched)
#  Manual run               → generates all missing
#  Manual "replace"         → replaces ALL images
#  Daily midnight           → catches any missed posts
# ============================================================

name: Auto Blog Image Generator

on:
  push:
    paths:
      - "blog/**.html"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "missing"
        type: choice
        options:
          - missing
          - replace

  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: blog-images
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Blog Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf2.0-dev libffi-dev \
            fonts-dejavu-core -qq

      - name: Install Python packages
        run: pip install -q pillow cairosvg

      - name: Run image generator
        run: |
          MODE="${{ github.event.inputs.mode || 'missing' }}"
          echo "Running in mode: $MODE"
          python3 generate_images_v5.py $MODE
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show results
        run: |
          echo "=== Generated images ==="
          ls -lh assets/images/blog/*.webp 2>/dev/null \
            | awk '{print $5, $9}' || echo "None"

      - name: Commit and push
        run: |
          git config user.name  "NeuraPlusAI Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/blog/ blog/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: blog images [skip ci]"
            git push
          else
            echo "Nothing new to commit"
          fi
